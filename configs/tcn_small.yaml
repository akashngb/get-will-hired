model_name: tcn
model:
  n_levels: 3
  n_channels: 32
  kernel_size: 3
  dropout: 0.1
training:
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  n_epochs: 10
  seq_len: 64
  patience: 4
  scheduler: cosine
  class_weighted: true
data:
  horizons: [10, 50, 100]
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
